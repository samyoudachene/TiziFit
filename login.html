{% extends 'base.html' %}
{% block content %}
<div style="background-image: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('{{ url_for('static', filename='uploads/log.jpg') }}'); background-size: cover; background-position: center; min-height: 85vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div style="max-width: 400px; width: 100%; background-color: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); color: #333;">
        <h2 style="margin-top: 0; color: #ff4757; text-align: center; text-transform: uppercase;">{{ t['form_log_title'] }}</h2>
        
        <form action="{{ url_for('login') }}" method="POST">
            <label style="font-weight: bold;">{{ t['form_email'] }}</label><br>
            <input type="email" name="email" required style="width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px;"><br>

            <label style="font-weight: bold;">{{ t['form_pwd'] }}</label><br>
            <input type="password" name="password" required style="width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px;"><br>

            <button type="submit" style="width: 100%; padding: 12px; background-color: #ff4757; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase;">{{ t['btn_login'] }}</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px; font-size: 14px;">
            {{ t['log_no_acc'] }} <a href="{{ url_for('inscription') }}" style="color: #ff4757; font-weight: bold; text-decoration: none;">{{ t['log_link_ins'] }}</a>
        </p>
    </div>
</div>
{% endblock %}
