{% extends 'base.html' %}
{% block content %}
<div style="max-width: 800px; margin: 0 auto; padding: 40px 20px; text-align: center;">
    <h1 style="color: #ff4757; text-transform: uppercase;">{{ t['about_title'] }}</h1>
    <h2 style="color: #f1f2f6; margin-bottom: 30px;">{{ t['about_sub'] }}</h2>
    
    <p style="color: #a4b0be; font-size: 18px; line-height: 1.8; text-align: justify; background: rgba(30,30,30,0.8); padding: 30px; border-radius: 10px; border-left: 4px solid #ff4757;">
        {{ t['about_p1'] }} <br><br>
        {{ t['about_p2'] | safe }}
    </p>
    <h2>{{ t['about_part_title'] }}</h2>
    <p>
        {{ t['about_part_desc'] }}
    </p>
</div>
{% endblock %}
